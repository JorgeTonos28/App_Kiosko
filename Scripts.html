<script>
  'use strict';

  const App = {
    token: localStorage.getItem('kioskopos_token') || '',
    user: null,
    config: null,
    products: [],
    categories: [],
    invoices: [],
    movements: [],
    users: [],
    dashboard: null,
    reports: null,
    activeReceipt: null,
    route: 'dashboard',
    cart: [],
    paymentMethod: 'Efectivo',
    discount: 0,
    received: 0,
    busyCount: 0,
    filters: {
      posQuery: '',
      posCategory: 'Todos',
      productQuery: '',
      productCategory: '',
      productStatus: '',
      inventoryQuery: '',
      inventoryProductId: '',
      inventoryFrom: '',
      inventoryTo: '',
      inventoryType: '',
      invoiceQuery: '',
      invoiceFrom: '',
      invoiceTo: '',
      invoicePayment: '',
      invoiceStatus: '',
      userQuery: '',
      reportPreset: 'month'
    }
  };

  const SEARCHABLE_ROUTES = {
    pos: true,
    products: true,
    inventory: true,
    sales: true,
    users: true
  };

  const NAV_ITEMS = [
    {id: 'dashboard', label: 'Dashboard', icon: 'dashboard', roles: ['ADMIN']},
    {id: 'pos', label: 'Facturación POS', icon: 'point_of_sale', roles: ['ADMIN', 'CAJERO']},
    {id: 'products', label: 'Productos', icon: 'inventory_2', roles: ['ADMIN']},
    {id: 'inventory', label: 'Inventario', icon: 'warehouse', roles: ['ADMIN']},
    {id: 'sales', label: 'Facturas / Ventas', icon: 'receipt_long', roles: ['ADMIN', 'CAJERO']},
    {id: 'users', label: 'Usuarios', icon: 'group', roles: ['ADMIN']},
    {id: 'reports', label: 'Reportes', icon: 'analytics', roles: ['ADMIN']},
    {id: 'settings', label: 'Configuración', icon: 'settings', roles: ['ADMIN']}
  ];

  const CATEGORY_ICONS = {
    Bebidas: 'local_drink',
    Snacks: 'fastfood',
    Comestibles: 'lunch_dining',
    Dulces: 'cookie',
    Galletas: 'bakery_dining',
    Varios: 'shopping_bag',
    Celulares: 'smartphone',
    'Artículos': 'category'
  };

  document.addEventListener('DOMContentLoaded', init);

  function init() {
    bindShellEvents();
    applyBranding(window.KIOSKO_BOOT || {});
    if (window.top !== window.self && window.innerWidth < 760) {
      try { window.top.location = window.location.href; } catch (error) {}
    }
    if (App.token) {
      bootstrap();
    } else {
      showLogin();
    }
  }

  function bindShellEvents() {
    document.getElementById('loginForm').addEventListener('submit', handleLogin);
    document.getElementById('togglePassword').addEventListener('click', function () {
      const input = document.getElementById('loginPassword');
      const visible = input.type === 'text';
      input.type = visible ? 'password' : 'text';
      this.querySelector('i').textContent = visible ? 'visibility' : 'visibility_off';
    });
    document.getElementById('logoutButton').addEventListener('click', logout);
    document.getElementById('openSidebar').addEventListener('click', openSidebar);
    document.getElementById('closeSidebar').addEventListener('click', closeSidebar);
    document.getElementById('sidebarBackdrop').addEventListener('click', closeSidebar);
    document.getElementById('globalSearch').addEventListener('input', handleGlobalSearch);
    document.addEventListener('keydown', function (event) {
      if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === 'k') {
        event.preventDefault();
        const search = document.getElementById('globalSearch');
        if (!search.closest('.topbar-search').hidden) search.focus();
      }
      if (event.key === 'Escape') {
        closeModal();
        closeDrawer();
        closeSidebar();
      }
    });
  }

  function applyBootLogo() {
    applyBranding(window.KIOSKO_BOOT || {});
  }

  function applyBranding(source) {
    source = source || {};
    const appName = source.appName || (App.config && App.config.appName) || 'KioskoPOS';
    const businessName = source.businessName || (App.config && App.config.businessName) || appName;
    const favicon = source.faviconDataUrl || (App.config && App.config.faviconDataUrl) || '';
    const logo = source.logoDataUrl || (App.config && App.config.logoDataUrl) || '';
    const primaryColor = source.primaryColor || (App.config && App.config.primaryColor) || '#0b2f78';
    document.title = appName;
    document.querySelector('meta[name="theme-color"]').setAttribute('content', primaryColor);
    updateText('loginCredentialHelp', 'Usa tus credenciales internas de ' + appName + '.');
    updateText('versionLabel', appName + ' v' + ((window.KIOSKO_BOOT && window.KIOSKO_BOOT.version) || ''));
    updateText('sidebarBusiness', businessName);
    updateText('sidebarAppName', appName);
    updateText('footerAppName', appName ? appName + ' v' + ((window.KIOSKO_BOOT && window.KIOSKO_BOOT.version) || '') : '');
    if (favicon) {
      updateFavicon('appFavicon', favicon);
      updateFavicon('appShortcutIcon', favicon);
    }
    if (logo) {
      document.getElementById('loginLogo').innerHTML = '<img alt="Logo de ' + escapeAttr(businessName) + '" src="' + logo + '">';
    } else {
      document.getElementById('loginLogo').innerHTML = icon('storefront');
    }
    renderWebSignature(source);
  }

  function updateText(id, value) {
    const element = document.getElementById(id);
    if (element) element.textContent = value;
  }

  function updateFavicon(id, href) {
    const element = document.getElementById(id);
    if (element) element.href = href;
  }

  function renderWebSignature(source) {
    source = source || {};
    const signature = document.getElementById('webSignature');
    if (!signature) return;
    const enabled = source.webSignatureEnabled !== false;
    const image = source.webSignatureDataUrl || '';
    const width = Math.min(420, Math.max(60, Number(source.webSignatureWidth || 140)));
    if (!enabled || !image) {
      signature.hidden = true;
      signature.innerHTML = '';
      return;
    }
    signature.style.setProperty('--signature-width', width + 'px');
    signature.innerHTML = '<img src="' + escapeAttr(image) + '" alt="Signature">';
    signature.hidden = false;
  }

  async function handleLogin(event) {
    event.preventDefault();
    const errorBox = document.getElementById('loginError');
    errorBox.hidden = true;
    setBusy(true, 'Validando acceso...');
    try {
      const result = await server('apiLogin', {
        identifier: document.getElementById('loginIdentifier').value,
        password: document.getElementById('loginPassword').value,
        remember: document.getElementById('rememberSession').checked
      });
      App.token = result.token;
      localStorage.setItem('kioskopos_token', result.token);
      await bootstrap();
    } catch (error) {
      errorBox.textContent = error.message;
      errorBox.hidden = false;
    } finally {
      setBusy(false);
    }
  }

  async function bootstrap() {
    setBusy(true, 'Preparando ' + ((window.KIOSKO_BOOT && window.KIOSKO_BOOT.appName) || 'KioskoPOS') + '...');
    try {
      const data = await server('apiBootstrap', App.token);
      App.user = data.user;
      App.config = data.config;
      App.products = data.products || [];
      App.categories = data.categories || [];
      App.invoices = data.invoices || [];
      App.movements = data.movements || [];
      App.users = data.users || [];
      App.dashboard = data.dashboard;
      App.reports = data.reports;
      App.paymentMethod = App.config.paymentMethods[0] || 'Efectivo';
      App.route = App.user.role === 'ADMIN' ? 'dashboard' : 'pos';
      showApp();
      renderNav();
      applyUserData();
      navigate(App.route);
    } catch (error) {
      localStorage.removeItem('kioskopos_token');
      App.token = '';
      showLogin();
      showToast(error.message, 'error');
    } finally {
      setBusy(false);
    }
  }

  async function logout() {
    const token = App.token;
    localStorage.removeItem('kioskopos_token');
    App.token = '';
    App.user = null;
    App.cart = [];
    renderWebSignature({});
    showLogin();
    if (token) server('apiLogout', token).catch(function () {});
  }

  function showLogin() {
    document.getElementById('loginView').hidden = false;
    document.getElementById('appShell').hidden = true;
    setTimeout(function () { document.getElementById('loginIdentifier').focus(); }, 80);
  }

  function showApp() {
    document.getElementById('loginView').hidden = true;
    document.getElementById('appShell').hidden = false;
  }

  function applyUserData() {
    const initial = (App.user.name || 'U').trim().charAt(0).toUpperCase();
    document.getElementById('sidebarUserName').textContent = App.user.name;
    document.getElementById('sidebarUserRole').textContent = roleLabel(App.user.role);
    document.getElementById('sidebarAvatar').textContent = initial;
    document.getElementById('topbarUserName').textContent = App.user.name;
    document.getElementById('topbarUserRole').textContent = roleLabel(App.user.role);
    document.getElementById('topbarAvatar').textContent = initial;
    document.getElementById('sidebarBusiness').textContent = App.config.businessName || 'KioskoPOS';
    document.getElementById('sidebarAppName').textContent = App.config.appName || 'KioskoPOS';
    document.documentElement.style.setProperty('--primary', App.config.primaryColor || '#0b2f78');
    applyBranding(App.config);
  }

  function renderNav() {
    document.getElementById('mainNav').innerHTML = NAV_ITEMS
      .filter(function (item) { return item.roles.includes(App.user.role); })
      .map(function (item) {
        return '<button class="nav-item ' + (item.id === App.route ? 'active' : '') + '" data-route="' + item.id + '">' +
          icon(item.icon) + '<span>' + item.label + '</span></button>';
      }).join('');
    document.querySelectorAll('[data-route]').forEach(function (button) {
      button.addEventListener('click', function () { navigate(button.dataset.route); });
    });
  }

  function navigate(route) {
    const item = NAV_ITEMS.find(function (nav) { return nav.id === route; });
    if (!item || !item.roles.includes(App.user.role)) return;
    App.route = route;
    document.querySelectorAll('.nav-item[data-route]').forEach(function (button) {
      button.classList.toggle('active', button.dataset.route === route);
    });
    document.getElementById('globalSearch').value = getCurrentSearch();
    updateGlobalSearchState();
    renderCurrentPage();
    closeSidebar();
    window.scrollTo({top: 0, behavior: 'smooth'});
  }

  function renderCurrentPage() {
    const renderers = {
      dashboard: renderDashboard,
      pos: renderPos,
      products: renderProducts,
      inventory: renderInventory,
      sales: renderSales,
      users: renderUsers,
      reports: renderReports,
      settings: renderSettings
    };
    const content = document.getElementById('pageContent');
    content.classList.remove('page-enter');
    renderers[App.route]();
    requestAnimationFrame(function () { content.classList.add('page-enter'); });
  }

  function renderDashboard() {
    const d = App.dashboard || emptyDashboard();
    const maxSales = Math.max.apply(null, d.dailySales.map(function (item) { return item.total; }).concat([1]));
    document.getElementById('pageContent').innerHTML =
      pageHeader('Vista general', 'Resumen operativo del kiosko en tiempo real.',
        '<button class="button button--success" onclick="navigate(\'pos\')">' + icon('add_shopping_cart') + 'Nueva venta</button>' +
        '<button class="button button--primary" onclick="openProductModal()">' + icon('add_circle') + 'Agregar producto</button>') +
      '<section class="metrics-grid">' +
        metricCard('payments', 'Ventas hoy', money(d.salesToday), 'positive', 'Actualizado al momento') +
        metricCard('receipt_long', 'Facturas hoy', d.invoiceCountToday, '', 'Comprobantes emitidos') +
        metricCard('warning', 'Stock bajo', d.lowStockCount, d.lowStockCount ? 'negative' : 'positive', d.lowStockCount ? 'Requiere atención' : 'Todo en orden') +
        metricCard('workspace_premium', 'Más vendido', escapeHtml(d.topProduct), '', d.topProductUnits + ' unidades') +
        metricCard('calendar_month', 'Total semana', money(d.weekTotal), 'positive', 'Semana en curso') +
        metricCard('trophy', 'Cajero destacado', escapeHtml(d.topCashier), '', 'Mayor volumen vendido') +
      '</section>' +
      '<section class="quick-actions">' +
        quickAction('point_of_sale', 'Nueva venta', 'Abrir terminal POS', 'navigate(\'pos\')') +
        quickAction('add_box', 'Agregar producto', 'Ampliar catálogo', 'openProductModal()') +
        quickAction('inventory', 'Entrada inventario', 'Registrar mercancía', 'openInventoryModal(\'ENTRADA\')') +
        quickAction('analytics', 'Ver reportes', 'Analizar resultados', 'navigate(\'reports\')') +
      '</section>' +
      '<section class="dashboard-grid">' +
        '<article class="card"><div class="card-header"><h2 class="section-title">Tendencia de ventas · 7 días</h2><span class="badge badge--info">Semana actual</span></div>' +
          '<div class="sales-chart">' + d.dailySales.map(function (day) {
            const height = Math.max(3, Math.round(day.total / maxSales * 88));
            return '<div class="chart-column"><strong>' + (day.total ? compactMoney(day.total) : '') + '</strong><div class="chart-bar" style="height:' + height + '%"></div><small>' + escapeHtml(day.label) + '</small></div>';
          }).join('') + '</div></article>' +
        '<article class="card"><div class="card-header"><h2 class="section-title">Alertas de inventario</h2><span class="badge ' + (d.lowStockCount ? 'badge--danger' : 'badge--success') + '">' + d.lowStockCount + ' alertas</span></div>' +
          '<div class="card-body alerts-list">' + renderLowStockAlerts(d.lowStock) + '</div></article>' +
      '</section>' +
      invoiceTableCard('Últimas facturas', d.latestInvoices, true);
  }

  function renderPos() {
    document.getElementById('pageContent').innerHTML =
      pageHeader('Terminal de ventas', 'Busca productos, arma la factura y cobra sin perder tiempo.',
        '<span class="badge badge--info">' + icon('person') + escapeHtml(App.user.name) + '</span>') +
      '<section class="pos-layout">' +
        '<div class="pos-catalog">' +
          '<div class="pos-search">' + icon('search') +
            '<input id="posSearch" value="' + escapeAttr(App.filters.posQuery) + '" placeholder="Buscar por nombre, SKU o código de barras..." autocomplete="off">' +
            '<kbd>Enter agrega SKU exacto</kbd></div>' +
          '<div id="categoryTabs" class="category-tabs"></div>' +
          '<div id="productGrid" class="product-grid"></div>' +
        '</div>' +
        '<aside id="cartPanel" class="cart-panel"></aside>' +
      '</section>';
    renderCategoryTabs();
    renderProductGrid();
    renderCart();
    const search = document.getElementById('posSearch');
    search.addEventListener('input', function () {
      App.filters.posQuery = search.value;
      document.getElementById('globalSearch').value = search.value;
      renderProductGrid();
    });
    search.addEventListener('keydown', function (event) {
      if (event.key === 'Enter') {
        const query = search.value.trim().toLowerCase();
        const exact = App.products.find(function (product) {
          return isProductSellable(product) &&
            (product.sku.toLowerCase() === query || String(product.barcode).toLowerCase() === query);
        });
        if (exact) {
          event.preventDefault();
          addToCart(exact.id);
          search.select();
        }
      }
    });
    setTimeout(function () { search.focus(); }, 100);
  }

  function renderCategoryTabs() {
    const categories = ['Todos'].concat(App.config.categories || []);
    document.getElementById('categoryTabs').innerHTML = categories.map(function (category) {
      return '<button class="category-tab ' + (App.filters.posCategory === category ? 'active' : '') +
        '" onclick="setPosCategory(\'' + escapeJs(category) + '\')">' + escapeHtml(category) + '</button>';
    }).join('');
  }

  function renderProductGrid() {
    const query = App.filters.posQuery.trim().toLowerCase();
    const products = App.products.filter(function (product) {
      const matchesCategory = App.filters.posCategory === 'Todos' || product.category === App.filters.posCategory;
      const haystack = [product.name, product.sku, product.barcode, product.category, product.searchText].join(' ').toLowerCase();
      return isProductSellable(product) && matchesCategory && (!query || haystack.includes(query));
    });
    document.getElementById('productGrid').innerHTML = products.length ? products.map(productCard).join('') :
      emptyState('search_off', 'No encontramos productos con esos filtros.');
  }

  function productCard(product) {
    const low = product.stock <= product.minimum;
    const out = product.stock <= 0;
    const symbol = product.imageUrl
      ? '<img src="' + product.imageUrl + '" alt="' + escapeAttr(product.name) + '">'
      : '<span class="product-symbol">' + icon(CATEGORY_ICONS[product.category] || 'inventory_2') + '</span>';
    return '<article id="product-card-' + product.id + '" class="product-card ' + (out ? 'out' : '') + '">' +
      '<div class="product-image"><span class="stock-chip ' + (low ? 'low' : '') + '">' + (out ? 'Agotado' : 'Stock: ' + product.stock) + '</span>' + symbol + '</div>' +
      '<div class="product-info"><small>' + escapeHtml(product.category) + ' · ' + escapeHtml(product.sku || 'Sin SKU') + '</small>' +
      '<h3 title="' + escapeAttr(product.name) + '">' + escapeHtml(product.name) + '</h3>' +
      '<div class="product-footer"><span class="product-price">' + money(product.price) + '</span>' +
      '<button class="add-product" ' + (out ? 'disabled' : '') + ' onclick="addToCart(\'' + product.id + '\')" aria-label="Agregar">' + icon('add') + '</button></div></div></article>';
  }

  function renderCart() {
    const subtotal = cartSubtotal();
    const discount = Math.min(subtotal, Math.max(0, Number(App.discount) || 0));
    const taxable = subtotal - discount;
    const tax = App.config.taxEnabled ? roundMoney(taxable * App.config.taxRate / 100) : 0;
    const total = roundMoney(taxable + tax);
    const change = App.paymentMethod === 'Efectivo' ? Math.max(0, roundMoney((Number(App.received) || 0) - total)) : 0;
    const provisionalNumber = App.config.invoicePrefix + '-' + String(App.config.invoiceNext).padStart(6, '0');
    document.getElementById('cartPanel').innerHTML =
      '<div class="cart-header"><div><h2>' + icon('shopping_cart') + 'Venta actual <span class="badge badge--info">' + App.cart.length + '</span></h2><small>Factura provisional: ' + escapeHtml(provisionalNumber) + '</small></div>' +
        '<button class="button button--plain" onclick="clearCart()">Limpiar</button></div>' +
      '<div class="cart-items">' + (App.cart.length ? App.cart.map(cartItemTemplate).join('') :
        '<div class="cart-empty">' + icon('shopping_cart_off') + '<strong>El carrito está vacío</strong><small>Agrega un producto para comenzar.</small></div>') + '</div>' +
      '<div class="cart-body"><p class="payment-label">Método de pago</p><div class="payment-options">' +
        App.config.paymentMethods.map(function (method) {
          return '<button class="payment-option ' + (App.paymentMethod === method ? 'active' : '') +
            '" onclick="selectPayment(\'' + escapeJs(method) + '\')">' + icon(paymentIcon(method)) + '<span>' + escapeHtml(method) + '</span></button>';
        }).join('') + '</div>' +
      '<div class="totals-box">' +
        '<div class="total-line"><span>Subtotal</span><strong id="cartSubtotalValue">' + money(subtotal) + '</strong></div>' +
        '<div class="total-line"><span>Descuento</span><strong id="cartDiscountValue">− ' + money(discount) + '</strong></div>' +
        (App.config.taxEnabled ? '<div class="total-line"><span>Impuesto (' + App.config.taxRate + '%)</span><strong id="cartTaxValue">' + money(tax) + '</strong></div>' : '') +
        '<div class="total-line total"><span>Total</span><strong id="cartTotalValue">' + money(total) + '</strong></div></div>' +
      '<div class="cart-fields"><label>Descuento<input id="discountInput" type="number" min="0" step="0.01" value="' + App.discount + '" oninput="updateCheckout(\'discount\', this.value)"></label>' +
        (App.paymentMethod === 'Efectivo'
          ? '<label>Monto recibido<input id="receivedInput" type="number" min="0" step="0.01" value="' + App.received + '" oninput="updateCheckout(\'received\', this.value)"></label>'
          : '<label>Monto recibido<div class="change-box">' + money(total) + '</div></label>') +
        '<label>Cambio<div id="changeBox" class="change-box">' + money(change) + '</div></label></div>' +
      '<div class="cart-actions"><button class="button button--danger" onclick="clearCart()">' + icon('close') + 'Cancelar</button>' +
        '<button class="button button--success button--large" ' + (!App.cart.length ? 'disabled' : '') + ' onclick="checkout()">' + icon('receipt_long') + 'Generar factura</button></div></div>';
  }

  function cartItemTemplate(item) {
    const product = App.products.find(function (entry) { return entry.id === item.productId; });
    if (!product) return '';
    return '<article class="cart-item"><div><h4>' + escapeHtml(product.name) + '</h4><small>' + money(product.price) + ' × ' + item.quantity + '</small></div>' +
      '<strong>' + money(product.price * item.quantity) + '</strong><div class="cart-item-controls">' +
      '<div class="quantity-control"><button onclick="changeCartQuantity(\'' + product.id + '\', -1)">−</button><b>' + item.quantity + '</b><button onclick="changeCartQuantity(\'' + product.id + '\', 1)">+</button></div>' +
      '<button class="icon-button" onclick="removeFromCart(\'' + product.id + '\')" aria-label="Eliminar">' + icon('delete') + '</button></div></article>';
  }

  function setPosCategory(category) {
    App.filters.posCategory = category;
    renderCategoryTabs();
    renderProductGrid();
  }

  function addToCart(productId) {
    const product = App.products.find(function (item) { return item.id === productId; });
    if (!product || product.stock <= 0 || !isProductSellable(product)) return;
    const current = App.cart.find(function (item) { return item.productId === productId; });
    if (current && current.quantity >= product.stock) {
      showToast('No hay más unidades disponibles de ' + product.name + '.', 'warning');
      return;
    }
    if (current) current.quantity += 1;
    else App.cart.push({productId: productId, quantity: 1});
    const card = document.getElementById('product-card-' + productId);
    if (card) {
      card.classList.remove('bump');
      requestAnimationFrame(function () { card.classList.add('bump'); });
    }
    renderCart();
  }

  function isProductSellable(product) {
    return Boolean(product) && product.status === 'ACTIVO' && App.categories.some(function (category) {
      return String(category.id) === String(product.categoryId) && category.status === 'ACTIVO';
    });
  }

  function changeCartQuantity(productId, delta) {
    const item = App.cart.find(function (entry) { return entry.productId === productId; });
    const product = App.products.find(function (entry) { return entry.id === productId; });
    if (!item || !product) return;
    const next = item.quantity + delta;
    if (next <= 0) return removeFromCart(productId);
    if (next > product.stock) return showToast('Stock máximo disponible: ' + product.stock, 'warning');
    item.quantity = next;
    renderCart();
  }

  function removeFromCart(productId) {
    App.cart = App.cart.filter(function (item) { return item.productId !== productId; });
    renderCart();
  }

  async function clearCart() {
    if (!App.cart.length) return;
    const accepted = await confirmAction('Cancelar venta', 'Se eliminarán todos los productos de la venta actual.', 'Sí, cancelar');
    if (!accepted) return;
    App.cart = [];
    App.discount = 0;
    App.received = 0;
    renderCart();
  }

  function selectPayment(method) {
    App.paymentMethod = method;
    if (method !== 'Efectivo') App.received = cartTotal();
    renderCart();
  }

  function updateCheckout(field, value) {
    if (field === 'discount') App.discount = Math.max(0, Number(value) || 0);
    if (field === 'received') App.received = Math.max(0, Number(value) || 0);
    const subtotal = cartSubtotal();
    const discount = Math.min(subtotal, App.discount);
    const taxable = subtotal - discount;
    const tax = App.config.taxEnabled ? roundMoney(taxable * App.config.taxRate / 100) : 0;
    const total = roundMoney(taxable + tax);
    const change = Math.max(0, roundMoney(App.received - total));
    const subtotalValue = document.getElementById('cartSubtotalValue');
    const discountValue = document.getElementById('cartDiscountValue');
    const taxValue = document.getElementById('cartTaxValue');
    const totalValue = document.getElementById('cartTotalValue');
    const changeBox = document.getElementById('changeBox');
    if (subtotalValue) subtotalValue.textContent = money(subtotal);
    if (discountValue) discountValue.textContent = '− ' + money(discount);
    if (taxValue) taxValue.textContent = money(tax);
    if (totalValue) totalValue.textContent = money(total);
    if (changeBox) changeBox.textContent = money(change);
  }

  function cartSubtotal() {
    return roundMoney(App.cart.reduce(function (sum, item) {
      const product = App.products.find(function (entry) { return entry.id === item.productId; });
      return sum + (product ? product.price * item.quantity : 0);
    }, 0));
  }

  function cartTotal() {
    const subtotal = cartSubtotal();
    const taxable = Math.max(0, subtotal - Math.min(subtotal, App.discount));
    return roundMoney(taxable + (App.config.taxEnabled ? taxable * App.config.taxRate / 100 : 0));
  }

  async function checkout() {
    if (!App.cart.length) return;
    const total = cartTotal();
    if (App.paymentMethod === 'Efectivo' && App.received < total) {
      showToast('El monto recibido debe cubrir el total de la venta.', 'warning');
      return;
    }
    setBusy(true, 'Generando factura...');
    try {
      const result = await server('apiCreateSale', App.token, {
        items: App.cart,
        discount: App.discount,
        paymentMethod: App.paymentMethod,
        received: App.received
      });
      App.products = result.products;
      App.dashboard = result.dashboard;
      App.invoices.unshift(invoiceSummaryFromDetail(result.invoice));
      App.config.invoiceNext += 1;
      App.cart = [];
      App.discount = 0;
      App.received = 0;
      if (App.route === 'pos') renderPos();
      showReceipt(result.invoice, true);
      showToast('Factura guardada e inventario actualizado.');
    } catch (error) {
      showToast(error.message, 'error');
    } finally {
      setBusy(false);
    }
  }

  function renderProducts() {
    const filtered = filteredProducts();
    const active = App.products.filter(function (p) { return p.status === 'ACTIVO'; });
    const low = active.filter(function (p) { return p.stock <= p.minimum; });
    document.getElementById('pageContent').innerHTML =
      pageHeader('Gestión de productos', 'Controla catálogo, precios, costos y niveles mínimos.',
        '<button class="button button--outline" onclick="openCategoryManager()">' + icon('category') + 'Categorías</button>' +
        '<button class="button button--primary button--large" onclick="openProductModal()">' + icon('add_circle') + 'Nuevo producto</button>') +
      '<section class="summary-grid">' +
        summaryCard('inventory_2', 'Total productos', App.products.length) +
        summaryCard('check_circle', 'Activos', active.length) +
        summaryCard('warning', 'Stock bajo', low.length) +
        summaryCard('category', 'Categorías activas', App.categories.filter(function (category) { return category.status === 'ACTIVO'; }).length) +
      '</section>' +
      '<div class="filters-bar">' + icon('filter_alt') +
        '<select id="productCategoryFilter"><option value="">Todas las categorías</option>' +
          App.categories.map(function (category) { return '<option ' + (App.filters.productCategory === category.name ? 'selected' : '') + '>' + escapeHtml(category.name) + '</option>'; }).join('') + '</select>' +
        '<select id="productStatusFilter"><option value="">Todos los estados</option><option value="ACTIVO" ' + (App.filters.productStatus === 'ACTIVO' ? 'selected' : '') + '>Activo</option><option value="INACTIVO" ' + (App.filters.productStatus === 'INACTIVO' ? 'selected' : '') + '>Inactivo</option></select>' +
        '<div class="filters-spacer"></div><span class="badge badge--info">' + filtered.length + ' resultados</span></div>' +
      '<article class="card table-card"><div class="table-wrap"><table><thead><tr><th>SKU / Código</th><th>Producto</th><th>Categoría</th><th>Precio</th><th>Costo</th><th>Stock</th><th>Estado</th><th>Acciones</th></tr></thead>' +
        '<tbody>' + (filtered.length ? filtered.map(productRow).join('') : '<tr><td colspan="8">' + emptyState('inventory_2', 'No hay productos para mostrar.') + '</td></tr>') + '</tbody></table></div></article>';
    document.getElementById('productCategoryFilter').addEventListener('change', function () {
      App.filters.productCategory = this.value; renderProducts();
    });
    document.getElementById('productStatusFilter').addEventListener('change', function () {
      App.filters.productStatus = this.value; renderProducts();
    });
  }

  function filteredProducts() {
    const query = App.filters.productQuery.trim().toLowerCase();
    return App.products.filter(function (p) {
      return (!query || [p.name, p.sku, p.barcode, p.category, p.searchText].join(' ').toLowerCase().includes(query)) &&
        (!App.filters.productCategory || p.category === App.filters.productCategory) &&
        (!App.filters.productStatus || p.status === App.filters.productStatus);
    });
  }

  function productRow(product) {
    const low = product.stock <= product.minimum;
    const details = (product.attributes || []).filter(function (attribute) { return attribute.value; }).slice(0, 3)
      .map(function (attribute) { return attribute.label + ': ' + attribute.value; }).join(' · ');
    return '<tr><td class="table-primary">' + escapeHtml(product.sku || 'Sin SKU') + '<br><small>' + escapeHtml(product.barcode || 'Sin código de barras') + '</small></td>' +
      '<td><div class="table-product"><span class="product-symbol">' + icon(CATEGORY_ICONS[product.category] || 'inventory_2') + '</span><div><strong>' + escapeHtml(product.name) + '</strong><small>' + escapeHtml(details || ('Mínimo: ' + product.minimum)) + '</small></div></div></td>' +
      '<td>' + escapeHtml(product.category) + '</td><td><strong>' + money(product.price) + '</strong></td><td>' + money(product.cost) + '</td>' +
      '<td><span class="badge ' + (low ? 'badge--danger' : 'badge--success') + '">' + product.stock + ' unid.</span></td>' +
      '<td>' + statusBadge(product.status) + '</td><td><div class="table-actions">' +
        '<button class="icon-button" title="Editar" onclick="openProductModal(\'' + product.id + '\')">' + icon('edit') + '</button>' +
        '<button class="icon-button" title="Movimientos" onclick="navigateProductMovements(\'' + product.id + '\')">' + icon('swap_vert') + '</button></div></td></tr>';
  }

  function openProductModal(productId) {
    if (!App.user || App.user.role !== 'ADMIN') return;
    const activeCategories = App.categories.filter(function (category) { return category.status === 'ACTIVO'; });
    const product = App.products.find(function (item) { return item.id === productId; }) || {
      id: '', sku: '', barcode: '', name: '', manualName: '',
      categoryId: activeCategories.length ? activeCategories[0].id : '',
      price: '', cost: '', stock: 0, minimum: 5, imageFileId: '', status: 'ACTIVO', attributes: []
    };
    const categoryOptions = App.categories.filter(function (category) {
      return category.status === 'ACTIVO' || category.id === product.categoryId;
    }).map(function (category) {
      return {value: category.id, label: category.name + (category.status === 'INACTIVO' ? ' · Inactiva' : '')};
    });
    openModal(
      '<div class="modal-header"><h3>' + (product.id ? 'Editar producto' : 'Nuevo producto') + '</h3><button class="icon-button" onclick="closeModal()">' + icon('close') + '</button></div>' +
      '<form id="productForm"><div class="modal-body form-grid">' +
        hiddenInput('id', product.id) +
        '<div id="productNamingNote" class="form-note form-note--info field--full"></div>' +
        fieldInput('name', 'Nombre del producto (opcional)', product.manualName || '', 'Ej. Galaxy A55') +
        fieldSelectObjects('categoryId', 'Categoría', categoryOptions, product.categoryId) +
        fieldInput('sku', 'Código / SKU (opcional)', product.sku, 'Ej. CEL-001') +
        fieldInput('barcode', 'Código de barras (opcional)', product.barcode, 'Opcional') +
        fieldInput('price', 'Precio de venta', product.price, '0.00', true, 'number', '0.01') +
        fieldInput('cost', 'Costo', product.cost, '0.00', true, 'number', '0.01') +
        (!product.id ? fieldInput('stock', 'Stock inicial', product.stock, '0', true, 'number', '1') : '') +
        fieldInput('minimum', 'Stock mínimo', product.minimum, '5', true, 'number', '1') +
        fieldInput('imageFileId', 'ID de imagen en Drive', product.imageFileId, 'Opcional', false, 'text', '', 'field--full') +
        fieldSelect('status', 'Estado', ['ACTIVO', 'INACTIVO'], product.status) +
        '<section id="dynamicProductFields" class="dynamic-product-fields field--full"></section>' +
      '</div><div class="modal-actions"><button type="button" class="button button--ghost" onclick="closeModal()">Cancelar</button><button class="button button--primary" type="submit">' + icon('save') + 'Guardar producto</button></div></form>',
      'wide'
    );
    const categorySelect = document.querySelector('#productForm [name="categoryId"]');
    categorySelect.addEventListener('change', function () {
      renderDynamicProductFields(this.value, product);
    });
    renderDynamicProductFields(product.categoryId, product);
    document.getElementById('productForm').addEventListener('submit', saveProduct);
  }

  function renderDynamicProductFields(categoryId, product) {
    const container = document.getElementById('dynamicProductFields');
    const category = App.categories.find(function (item) { return item.id === categoryId; });
    if (!container || !category) return;
    const canGenerateName = category.fields.some(function (field) { return field.key === 'marca'; }) &&
      category.fields.some(function (field) { return field.key === 'modelo'; });
    const nameInput = document.querySelector('#productForm [name="name"]');
    const nameLabel = nameInput.closest('.field').querySelector('span');
    nameInput.required = !canGenerateName;
    nameLabel.textContent = canGenerateName ? 'Nombre del producto (opcional)' : 'Nombre del producto *';
    document.getElementById('productNamingNote').innerHTML = icon('info') + '<span>' + (canGenerateName
      ? 'Puedes indicar un nombre o dejarlo vacío para generarlo automáticamente con <strong>Marca y Modelo</strong>. SKU y código de barras son opcionales.'
      : 'Esta categoría no genera el nombre automáticamente. Indica un <strong>nombre de producto</strong>; SKU y código de barras siguen siendo opcionales.') + '</span>';
    const stored = {};
    (product.attributes || []).forEach(function (attribute) { stored[attribute.fieldId] = attribute.value; });
    container.innerHTML = '<div class="dynamic-fields-heading"><div><span class="eyebrow">CARACTERÍSTICAS DE ' + escapeHtml(category.name.toUpperCase()) + '</span><h4>Detalles adicionales</h4></div><span class="badge badge--info">' + category.fields.length + ' campos</span></div>' +
      (category.fields.length ? '<div class="form-grid">' + category.fields.map(function (field) {
        return dynamicProductField(field, stored[field.id] || '');
      }).join('') + '</div>' : '<div class="empty-inline">Esta categoría no requiere detalles adicionales.</div>');
  }

  function dynamicProductField(field, value) {
    const required = field.required ? ' required' : '';
    const label = escapeHtml(field.label) + (field.required ? ' *' : '');
    if (field.type === 'TEXTAREA') {
      return '<label class="field field--full"><span>' + label + '</span><textarea data-attribute-id="' + field.id + '"' + required + '>' + escapeHtml(value) + '</textarea></label>';
    }
    if (field.type === 'SELECT') {
      return '<label class="field"><span>' + label + '</span><select data-attribute-id="' + field.id + '"' + required + '><option value="">Seleccione...</option>' +
        field.options.map(function (option) { return '<option ' + (String(option) === String(value) ? 'selected' : '') + '>' + escapeHtml(option) + '</option>'; }).join('') + '</select></label>';
    }
    const type = field.type === 'NUMBER' ? 'number' : field.type === 'DATE' ? 'date' : 'text';
    return '<label class="field"><span>' + label + '</span><input data-attribute-id="' + field.id + '" type="' + type + '" value="' + escapeAttr(value) + '"' + required + '></label>';
  }

  async function saveProduct(event) {
    event.preventDefault();
    const payload = formObject(event.currentTarget);
    payload.attributes = {};
    event.currentTarget.querySelectorAll('[data-attribute-id]').forEach(function (input) {
      payload.attributes[input.dataset.attributeId] = input.value;
    });
    setBusy(true, 'Guardando producto...');
    try {
      const result = await server('apiSaveProduct', App.token, payload);
      App.products = result.products;
      closeModal();
      renderProducts();
      showToast('Producto guardado correctamente.');
    } catch (error) {
      showToast(error.message, 'error');
    } finally {
      setBusy(false);
    }
  }

  function openCategoryManager() {
    openModal(
      '<div class="modal-header"><div><h3>Categorías de productos</h3><small>Define qué información recoge cada tipo de producto.</small></div><button class="icon-button" onclick="closeModal()">' + icon('close') + '</button></div>' +
      '<div class="modal-body"><div class="category-manager-toolbar"><div><strong>' + App.categories.length + ' categorías configuradas</strong><small>Los campos básicos permanecen disponibles en todas.</small></div><button class="button button--primary" onclick="openCategoryEditor()">' + icon('add') + 'Nueva categoría</button></div>' +
      '<div class="category-manager-list">' + App.categories.map(categoryManagerCard).join('') + '</div></div>' +
      '<div class="modal-actions"><button class="button button--ghost" onclick="closeModal()">Cerrar</button></div>',
      'wide'
    );
  }

  function categoryManagerCard(category) {
    const requiredCount = category.fields.filter(function (field) { return field.required; }).length;
    return '<article class="category-manager-card"><div class="category-manager-icon">' + icon(CATEGORY_ICONS[category.name] || 'category') + '</div><div class="category-manager-info"><div><h4>' + escapeHtml(category.name) + '</h4>' + statusBadge(category.status) + '</div><p>' + escapeHtml(category.description || 'Sin descripción.') + '</p><div class="category-field-chips">' +
      (category.fields.length ? category.fields.slice(0, 6).map(function (field) {
        return '<span>' + escapeHtml(field.label) + (field.required ? ' *' : '') + '</span>';
      }).join('') : '<span>Solo campos básicos</span>') +
      (category.fields.length > 6 ? '<span>+' + (category.fields.length - 6) + ' más</span>' : '') + '</div><small>' + category.fields.length + ' adicionales · ' + requiredCount + ' obligatorios</small></div>' +
      '<button class="button button--outline" onclick="openCategoryEditor(\'' + category.id + '\')">' + icon('edit') + 'Editar</button></article>';
  }

  function openCategoryEditor(categoryId) {
    const category = App.categories.find(function (item) { return item.id === categoryId; }) || {
      id: '', name: '', description: '', status: 'ACTIVO', fields: []
    };
    openModal(
      '<div class="modal-header"><div><h3>' + (category.id ? 'Editar categoría' : 'Nueva categoría') + '</h3><small>Configura los detalles que tendrá cada producto.</small></div><button class="icon-button" onclick="openCategoryManager()">' + icon('arrow_back') + '</button></div>' +
      '<form id="categoryForm"><div class="modal-body">' + hiddenInput('id', category.id) +
        '<div class="form-grid">' +
          fieldInput('name', 'Nombre de la categoría', category.name, 'Ej. Accesorios', true) +
          fieldSelect('status', 'Estado', ['ACTIVO', 'INACTIVO'], category.status) +
          '<label class="field field--full"><span>Descripción</span><textarea name="description" placeholder="Explica brevemente qué productos agrupa.">' + escapeHtml(category.description) + '</textarea></label>' +
        '</div><section class="basic-fields-panel"><div><span class="eyebrow">CAMPOS BÁSICOS</span><h4>Incluidos automáticamente</h4><p>No se pueden quitar. Nombre, SKU y código de barras son opcionales; precio, costo, stock y estado forman parte del registro base.</p></div><div class="category-field-chips"><span>Nombre</span><span>SKU</span><span>Código de barras</span><span>Precio</span><span>Costo</span><span>Stock</span><span>Stock mínimo</span><span>Imagen</span><span>Estado</span></div></section>' +
        '<section class="category-fields-editor"><div class="dynamic-fields-heading"><div><span class="eyebrow">CAMPOS ADICIONALES</span><h4>Características de la categoría</h4></div><button type="button" class="button button--ghost" onclick="addCategoryFieldRow()">' + icon('add') + 'Agregar característica</button></div><div id="categoryFieldRows"></div></section>' +
      '</div><div class="modal-actions"><button type="button" class="button button--ghost" onclick="openCategoryManager()">Cancelar</button><button class="button button--primary" type="submit">' + icon('save') + 'Guardar categoría</button></div></form>',
      'wide'
    );
    category.fields.forEach(function (field) { addCategoryFieldRow(field); });
    document.getElementById('categoryForm').addEventListener('submit', saveCategory);
  }

  function addCategoryFieldRow(field) {
    field = field || {id: '', key: '', label: '', type: 'TEXT', required: false, options: []};
    const container = document.getElementById('categoryFieldRows');
    if (!container) return;
    const row = document.createElement('div');
    row.className = 'category-field-row';
    row.dataset.fieldId = field.id || '';
    row.dataset.fieldKey = field.key || '';
    row.innerHTML = '<div class="field-row-handle">' + icon('drag_indicator') + '</div>' +
      '<label class="field"><span>Nombre del campo</span><input data-field-label value="' + escapeAttr(field.label || '') + '" placeholder="Ej. Material" required></label>' +
      '<label class="field"><span>Tipo de dato</span><select data-field-type onchange="toggleCategoryFieldOptions(this)">' +
        categoryFieldTypeOptions(field.type) + '</select></label>' +
      '<label class="field category-options-field ' + (field.type === 'SELECT' ? '' : 'is-hidden') + '"><span>Opciones</span><input data-field-options value="' + escapeAttr((field.options || []).join(', ')) + '" placeholder="Opción 1, Opción 2"></label>' +
      '<label class="required-toggle"><input data-field-required type="checkbox" ' + (field.required ? 'checked' : '') + '><span>Obligatorio</span></label>' +
      '<button type="button" class="icon-button field-remove" title="Quitar característica" onclick="removeCategoryField(this)">' + icon('delete') + '</button>';
    container.appendChild(row);
  }

  function categoryFieldTypeOptions(selected) {
    const types = [
      {value: 'TEXT', label: 'Texto corto'},
      {value: 'TEXTAREA', label: 'Texto largo'},
      {value: 'NUMBER', label: 'Número'},
      {value: 'SELECT', label: 'Lista de opciones'},
      {value: 'DATE', label: 'Fecha'}
    ];
    return types.map(function (type) {
      return '<option value="' + type.value + '" ' + (type.value === selected ? 'selected' : '') + '>' + type.label + '</option>';
    }).join('');
  }

  function toggleCategoryFieldOptions(select) {
    const row = select.closest('.category-field-row');
    row.querySelector('.category-options-field').classList.toggle('is-hidden', select.value !== 'SELECT');
  }

  function removeCategoryField(button) {
    button.closest('.category-field-row').remove();
  }

  async function saveCategory(event) {
    event.preventDefault();
    const payload = formObject(event.currentTarget);
    payload.fields = Array.from(document.querySelectorAll('#categoryFieldRows .category-field-row')).map(function (row) {
      return {
        id: row.dataset.fieldId,
        key: row.dataset.fieldKey,
        label: row.querySelector('[data-field-label]').value,
        type: row.querySelector('[data-field-type]').value,
        required: row.querySelector('[data-field-required]').checked,
        options: row.querySelector('[data-field-options]').value
      };
    });
    setBusy(true, 'Guardando categoría...');
    try {
      const result = await server('apiSaveCategory', App.token, payload);
      App.categories = result.categories;
      App.config = result.config;
      App.products = result.products;
      if (App.route === 'products') renderProducts();
      openCategoryManager();
      showToast('Categoría y características guardadas correctamente.');
    } catch (error) {
      showToast(error.message, 'error');
    } finally {
      setBusy(false);
    }
  }

  function renderInventory() {
    const active = App.products.filter(function (p) { return p.status === 'ACTIVO'; });
    const selected = App.products.find(function (product) { return product.id === App.filters.inventoryProductId; }) || null;
    const scopedProducts = selected ? [selected] : active;
    const visibleMovements = filterMovementsClient();
    const totalUnits = scopedProducts.reduce(function (sum, p) { return sum + p.stock; }, 0);
    const inventoryValue = scopedProducts.reduce(function (sum, p) { return sum + p.stock * p.cost; }, 0);
    const low = active.filter(function (p) { return p.stock <= p.minimum; }).sort(function (a, b) { return a.stock - b.stock; });
    document.getElementById('pageContent').innerHTML =
      pageHeader(selected ? 'Movimientos de ' + selected.name : 'Inventario y movimientos', selected
        ? 'Historial filtrado del producto seleccionado.'
        : 'Entradas, salidas y ventas con trazabilidad completa.',
        '<button class="button button--success" onclick="openInventoryModal(\'ENTRADA\', \'' + (selected ? selected.id : '') + '\')">' + icon('add_box') + 'Entrada</button>' +
        '<button class="button button--primary" onclick="openInventoryModal(\'SALIDA\', \'' + (selected ? selected.id : '') + '\')">' + icon('outbox') + 'Salida</button>') +
      '<section class="summary-grid">' +
        summaryCard('inventory', selected ? 'Stock actual' : 'Unidades disponibles', totalUnits) +
        summaryCard('paid', 'Valor a costo', money(inventoryValue)) +
        summaryCard('warning', selected ? 'Stock mínimo' : 'Productos bajos', selected ? selected.minimum : low.length) +
        summaryCard('swap_vert', 'Movimientos visibles', visibleMovements.length) +
      '</section>' +
      '<div class="filters-bar inventory-filters">' + icon('filter_alt') +
        '<select id="inventoryProductFilter"><option value="">Vista general · Todos los productos</option>' +
          App.products.map(function (product) { return '<option value="' + product.id + '" ' + (selected && selected.id === product.id ? 'selected' : '') + '>' + escapeHtml(product.name) + '</option>'; }).join('') + '</select>' +
        '<label class="compact-date-field"><span>Desde</span><input id="inventoryFrom" type="date" value="' + escapeAttr(App.filters.inventoryFrom) + '"></label>' +
        '<label class="compact-date-field"><span>Hasta</span><input id="inventoryTo" type="date" value="' + escapeAttr(App.filters.inventoryTo) + '"></label>' +
        '<select id="inventoryType"><option value="">Todos los tipos</option>' + ['ENTRADA', 'SALIDA', 'VENTA', 'ANULACION'].map(function (type) {
          return '<option value="' + type + '" ' + (App.filters.inventoryType === type ? 'selected' : '') + '>' + type + '</option>';
        }).join('') + '</select><div class="filters-spacer"></div>' +
        '<button class="button button--outline" onclick="refreshInventoryMovements()">' + icon('search') + 'Aplicar</button>' +
        '<button class="button button--plain" onclick="clearInventoryFilters()">Limpiar</button></div>' +
      '<section class="inventory-layout">' +
        '<article class="card table-card"><div class="card-header"><h2 class="section-title">' + (selected ? 'Historial del producto' : 'Movimientos de inventario') + '</h2><span class="badge badge--info">' + visibleMovements.length + ' registros</span></div><div class="table-wrap">' +
          '<table><thead><tr><th>Fecha</th><th>Producto</th><th>Tipo</th><th>Cantidad</th><th>Comentario</th><th>Usuario</th><th>Antes → Después</th></tr></thead><tbody>' +
          (visibleMovements.length ? visibleMovements.map(movementRow).join('') : '<tr><td colspan="7">' + emptyState('swap_vert', 'Todavía no hay movimientos con esos filtros.') + '</td></tr>') +
          '</tbody></table></div></article>' +
        inventorySidePanel(selected, low) + '</section>';
    ['inventoryProductFilter', 'inventoryFrom', 'inventoryTo', 'inventoryType'].forEach(function (id) {
      document.getElementById(id).addEventListener('change', function () {
        const keys = {
          inventoryProductFilter: 'inventoryProductId', inventoryFrom: 'inventoryFrom',
          inventoryTo: 'inventoryTo', inventoryType: 'inventoryType'
        };
        App.filters[keys[id]] = this.value;
      });
    });
  }

  function filterMovementsClient() {
    const query = App.filters.inventoryQuery.trim().toLowerCase();
    if (!query) return App.movements;
    return App.movements.filter(function (movement) {
      return [
        movement.product, movement.sku, movement.type, movement.comment,
        movement.user, movement.invoiceId
      ].join(' ').toLowerCase().includes(query);
    });
  }

  function inventorySidePanel(selected, low) {
    if (!selected) {
      return '<aside class="card low-stock-panel"><div class="card-header" style="padding:0 0 15px;border:0"><h2 class="section-title">Stock bajo</h2><span class="badge badge--danger">' + low.length + '</span></div><div class="alerts-list">' + renderLowStockAlerts(low.slice(0, 10)) + '</div></aside>';
    }
    const attributes = (selected.attributes || []).filter(function (attribute) { return attribute.value; });

  function filterInvoicesClient() {
    const query = App.filters.invoiceQuery.trim().toLowerCase();
    return App.invoices.filter(function (invoice) {
      const day = new Date(invoice.date);
      return (!App.filters.invoiceFrom || day >= new Date(App.filters.invoiceFrom + 'T00:00:00')) &&
        (!App.filters.invoiceTo || day <= new Date(App.filters.invoiceTo + 'T23:59:59')) &&
        (!App.filters.invoicePayment || invoice.paymentMethod === App.filters.invoicePayment) &&
        (!App.filters.invoiceStatus || invoice.status === App.filters.invoiceStatus) &&
        (!query || [
          invoice.number, invoice.cashier, invoice.paymentMethod, invoice.status,
          invoice.total
        ].join(' ').toLowerCase().includes(query));
    });
  }

  function lineChart(data) {
    if (!data || !data.length) return emptyState('show_chart', 'No hay datos en este período.');
    const width = 720, height = 260, pad = 32;
    const max = Math.max.apply(null, data.map(function (item) { return item.total; }).concat([1]));
    const points = data.map(function (item, index) {
      const x = pad + (data.length === 1 ? (width - pad * 2) / 2 : index * (width - pad * 2) / (data.length - 1));
      const y = height - pad - item.total / max * (height - pad * 2);
      return {x: x, y: y, item: item};
    });
    const polyline = points.map(function (point) { return point.x + ',' + point.y; }).join(' ');
    const area = pad + ',' + (height - pad) + ' ' + polyline + ' ' + (width - pad) + ',' + (height - pad);
    return '<svg class="line-chart-svg" viewBox="0 0 ' + width + ' ' + height + '" role="img" aria-label="Gráfico de ventas">' +
      '<defs><linearGradient id="chartAreaGradient" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="#0b2f78" stop-opacity=".22"/><stop offset="1" stop-color="#0b2f78" stop-opacity=".02"/></linearGradient></defs>' +
      [0,1,2,3,4].map(function (i) { const y = pad + i * (height - pad * 2) / 4; return '<line class="chart-grid-line" x1="' + pad + '" x2="' + (width-pad) + '" y1="' + y + '" y2="' + y + '"/>'; }).join('') +
      '<polygon class="chart-area" points="' + area + '"/><polyline class="chart-line" points="' + polyline + '"/>' +
      points.map(function (point) { return '<circle class="chart-dot" cx="' + point.x + '" cy="' + point.y + '" r="5"><title>' + escapeHtml(point.item.label) + ': ' + money(point.item.total) + '</title></circle>'; }).join('') +
      points.filter(function (_, index) { return data.length <= 12 || index % Math.ceil(data.length / 10) === 0; }).map(function (point) {
        return '<text x="' + point.x + '" y="' + (height - 7) + '" text-anchor="middle" font-size="10" fill="#687083">' + escapeHtml(point.item.label) + '</text>';
      }).join('') + '</svg>';

  async function saveSettings(event) {
    event.preventDefault();
    const payload = formObject(event.currentTarget);
    payload.TAX_ENABLED = event.currentTarget.elements.TAX_ENABLED.checked ? 'TRUE' : 'FALSE';
    setBusy(true, 'Guardando configuración...');
    try {
      const result = await server('apiSaveSettings', App.token, payload);
      App.config = result.config;
      applyUserData();
      renderSettings();
      showToast('Configuración actualizada.');
    } catch (error) {
      showToast(error.message, 'error');
    } finally {
      setBusy(false);
    }
  }

  async function changePassword(event) {
    event.preventDefault();
    setBusy(true, 'Actualizando contraseña...');
    try {
      await server('apiChangeMyPassword', App.token, formObject(event.currentTarget));
      event.currentTarget.reset();
      showToast('Contraseña actualizada.');
    } catch (error) {
      showToast(error.message, 'error');
    } finally {
      setBusy(false);
    }
  }

  function receiptPaperMarkup(invoice, business, printMode) {

    return '<div class="receipt-paper"><div class="receipt-brand">' +

      '<div class="receipt-meta"><div><span>NO. FACTURA</span><strong>' + escapeHtml(invoice.number) + '</strong></div><div><span>FECHA</span><strong>' + dateTime(invoice.date) + '</strong></div><div><span>CAJERO</span><strong>' + escapeHtml(invoice.cashier) + '</strong></div><div><span>ESTADO</span><strong>' + escapeHtml(invoice.status) + '</strong></div></div>' +

      }).join('') + '</div><div class="receipt-totals">' +
      totalLine('Subtotal', money(invoice.subtotal)) + (invoice.discount ? totalLine('Descuento', '− ' + money(invoice.discount)) : '') +
      (invoice.tax ? totalLine('Impuesto', money(invoice.tax)) : '') +
      '<div class="receipt-total final"><span>TOTAL</span><strong>' + money(invoice.total) + '</strong></div></div>' +
      '<div class="receipt-payment">' + paymentMark + ' ' + escapeHtml(invoice.paymentMethod) +
      (invoice.paymentMethod === 'Efectivo' ? ' · Recibido ' + money(invoice.received) + ' · Cambio ' + money(invoice.change) : '') + '</div>' +
      '<p class="receipt-footer">' + escapeHtml(business.receiptFooter || '¡Gracias por su compra!') + '</p></div>';
  }

  function printActiveReceipt() {
    if (!App.activeReceipt) return showToast('No hay una factura preparada para imprimir.', 'warning');
    printReceiptDocument(App.activeReceipt);
  }

  function printReceiptDocument(invoice) {
    const business = invoice.business || App.config;
    const frame = document.createElement('iframe');
    frame.className = 'print-frame';
    frame.setAttribute('title', 'Impresión de factura ' + invoice.number);
    frame.setAttribute('aria-hidden', 'true');
    document.body.appendChild(frame);
    const printDocument = frame.contentDocument || frame.contentWindow.document;
    const styles = '*,*::before,*::after{box-sizing:border-box}html,body{margin:0;padding:0;background:#fff;color:#111;font-family:Arial,Helvetica,sans-serif;font-size:10px;line-height:1.28}body{width:80mm;-webkit-print-color-adjust:exact;print-color-adjust:exact}.receipt-paper{width:80mm;min-height:auto;padding:5mm 4.5mm;background:#fff}.receipt-brand{text-align:center;margin-bottom:9px}.receipt-brand img{display:block;max-width:46mm;max-height:16mm;object-fit:contain;margin:0 auto 6px}.receipt-brand h2{font-size:16px;color:#111;margin:0 0 3px;font-weight:800}.receipt-brand p{margin:1px 0;color:#333;font-size:9px}.receipt-meta{display:grid;grid-template-columns:1fr 1fr;gap:5px 9px;border-top:1px dashed #333;border-bottom:1px dashed #333;padding:7px 0;margin:8px 0}.receipt-meta div{display:flex;flex-direction:column;gap:1px;min-width:0}.receipt-meta span{font-size:7px;color:#555;text-transform:uppercase}.receipt-meta strong{font-size:9px;color:#111;word-break:break-word}.receipt-items{padding:6px 0;border-bottom:1px dashed #333}.receipt-item{display:flex;justify-content:space-between;gap:8px;padding:3px 0;break-inside:avoid}.receipt-item>div{display:flex;flex-direction:column;min-width:0}.receipt-item strong{font-size:9.5px}.receipt-item small{color:#555;margin-top:1px;font-size:8px}.receipt-totals{padding-top:6px}.receipt-total{display:flex;justify-content:space-between;gap:8px;padding:2px 0;color:#333}.receipt-total.final{font-size:14px;color:#111;border-top:1px solid #111;margin-top:5px;padding-top:6px;font-weight:800}.receipt-payment{margin-top:8px;padding:6px 0;border-top:1px dashed #333;border-bottom:1px dashed #333;color:#111;background:#fff;border-radius:0;font-weight:700}.receipt-payment-mark{display:inline-grid;place-items:center;width:13px;height:13px;border:1px solid currentColor;border-radius:50%;margin-right:3px;font-size:8px}.receipt-footer{text-align:center;color:#333;font-style:italic;margin:11px 0 0;font-size:8.5px}@page{size:80mm 210mm;margin:0}@media print{html,body{width:80mm;height:auto}.receipt-paper{box-shadow:none;border:0}}';
    printDocument.open();
    printDocument.write('<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>' + escapeHtml(invoice.number) + '</title><style>' + styles + '</style></head><body>' + receiptPaperMarkup(invoice, business, true) + '</body></html>');
    printDocument.close();

    let printed = false;
    const cleanup = function () { if (frame.parentNode) frame.parentNode.removeChild(frame); };
    const startPrint = function () {
      if (printed) return;
      printed = true;
      frame.contentWindow.addEventListener('afterprint', function () { setTimeout(cleanup, 250); }, {once:true});
      frame.contentWindow.focus();
      frame.contentWindow.print();
      setTimeout(cleanup, 60000);
    };
    frame.onload = function () { setTimeout(startPrint, 120); };
    if (printDocument.readyState === 'complete') setTimeout(startPrint, 120);
  }

  function openModal(content, size) {
    document.getElementById('modalRoot').innerHTML = '<div class="modal-overlay" onmousedown="overlayPointerDown(event)" onclick="overlayClose(event, \'modal\')"><div class="modal ' + (size === 'wide' ? 'modal--wide' : '') + '">' + content + '</div></div>';
    updateOverlayScrollLock();
  }

  function closeModal() {
    document.getElementById('modalRoot').innerHTML = '';
    updateOverlayScrollLock();
  }

  function openDrawer(content) {
    document.getElementById('drawerRoot').innerHTML = '<div class="drawer-overlay" onmousedown="overlayPointerDown(event)" onclick="overlayClose(event, \'drawer\')"><aside class="drawer">' + content + '</aside></div>';
    updateOverlayScrollLock();
  }

  function closeDrawer() {
    document.getElementById('drawerRoot').innerHTML = '';
    updateOverlayScrollLock();
  }

  function overlayPointerDown(event) {
    event.currentTarget.dataset.startedOnOverlay = event.target === event.currentTarget ? '1' : '0';
  }

  function overlayClose(event, type) {
    if (event.target !== event.currentTarget) return;
    if (event.currentTarget.dataset.startedOnOverlay !== '1') return;
    type === 'modal' ? closeModal() : closeDrawer();
  }

  function confirmAction(title, message, acceptLabel) {
    return new Promise(function (resolve) {
      const overlay = document.getElementById('confirmOverlay');
      document.getElementById('confirmTitle').textContent = title;
      document.getElementById('confirmMessage').textContent = message;
      document.getElementById('confirmAccept').textContent = acceptLabel || 'Confirmar';
      overlay.hidden = false;
      updateOverlayScrollLock();
      const cleanup = function (answer) {
        overlay.hidden = true;
        document.getElementById('confirmAccept').onclick = null;
        document.getElementById('confirmCancel').onclick = null;
        updateOverlayScrollLock();
        resolve(answer);
      };
      document.getElementById('confirmAccept').onclick = function () { cleanup(true); };
      document.getElementById('confirmCancel').onclick = function () { cleanup(false); };
    });
  }

  function updateOverlayScrollLock() {
    const modalOpen = Boolean(document.getElementById('modalRoot').innerHTML.trim());
    const drawerOpen = Boolean(document.getElementById('drawerRoot').innerHTML.trim());
    const confirmOpen = !document.getElementById('confirmOverlay').hidden;
    document.documentElement.classList.toggle('scroll-locked', modalOpen || drawerOpen || confirmOpen);
    document.body.classList.toggle('scroll-locked', modalOpen || drawerOpen || confirmOpen);
  }

  function openSidebar() {
    document.getElementById('sidebar').classList.add('open');
    document.getElementById('sidebarBackdrop').classList.add('show');
  }

  function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebarBackdrop').classList.remove('show');
  }

  function handleGlobalSearch(event) {
    const value = event.target.value;
    if (App.route === 'pos') {
      App.filters.posQuery = value;
      const input = document.getElementById('posSearch');
      if (input) input.value = value;
      renderProductGrid();
    } else if (App.route === 'products') {
      App.filters.productQuery = value;
      renderProducts();
    } else if (App.route === 'inventory') {
      App.filters.inventoryQuery = value;
      renderInventory();
    } else if (App.route === 'sales') {
      App.filters.invoiceQuery = value;
      renderSales();
    } else if (App.route === 'users') {
      App.filters.userQuery = value;
      renderUsers();
    }
  }

  function getCurrentSearch() {
    if (App.route === 'pos') return App.filters.posQuery;
    if (App.route === 'products') return App.filters.productQuery;
    if (App.route === 'inventory') return App.filters.inventoryQuery;
    if (App.route === 'sales') return App.filters.invoiceQuery;
    if (App.route === 'users') return App.filters.userQuery;
    return '';
  }

  function updateGlobalSearchState() {
    const wrapper = document.querySelector('.topbar-search');
    const input = document.getElementById('globalSearch');
    const visible = Boolean(SEARCHABLE_ROUTES[App.route]);
    wrapper.hidden = !visible;
    input.disabled = !visible;
    input.placeholder = visible ? searchPlaceholderForRoute(App.route) : '';
  }

  function searchPlaceholderForRoute(route) {
    const labels = {
      pos: 'Buscar productos para vender...',
      products: 'Buscar productos...',
      inventory: 'Buscar movimientos o productos...',
      sales: 'Buscar facturas, cajeros o métodos...',
      users: 'Buscar usuarios...'
    };
    return labels[route] || '';
  }

  async function navigateProductMovements(productId) {
    App.filters.inventoryProductId = productId;
    App.filters.inventoryFrom = '';
    App.filters.inventoryTo = '';
    App.filters.inventoryType = '';
    App.movements = [];
    navigate('inventory');
    await refreshInventoryMovements();
  }

  function setBusy(active, message) {
    App.busyCount = Math.max(0, App.busyCount + (active ? 1 : -1));
    const overlay = document.getElementById('busyOverlay');
    if (message) document.getElementById('busyText').textContent = message;
    overlay.hidden = App.busyCount === 0;
  }

  function showToast(message, type) {
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    toast.className = 'toast ' + (type || '');
    toast.innerHTML = icon(type === 'error' ? 'error' : type === 'warning' ? 'warning' : 'check_circle') +
      '<span>' + escapeHtml(message) + '</span><button aria-label="Cerrar">' + icon('close') + '</button>';
    toast.querySelector('button').onclick = function () { toast.remove(); };
    container.appendChild(toast);
    setTimeout(function () { toast.remove(); }, 4800);
  }

  function pageHeader(title, subtitle, actions) {
    return '<header class="page-header"><div class="page-title"><h1>' + escapeHtml(title) + '</h1><p>' + escapeHtml(subtitle) + '</p></div>' +
      (actions ? '<div class="header-actions">' + actions + '</div>' : '') + '</header>';
  }

  function metricCard(iconName, label, value, valueClass, note) {
    return '<article class="metric-card"><div class="metric-icon ' + (iconName === 'warning' ? 'metric-icon--danger' : iconName === 'payments' || iconName === 'trending_up' ? 'metric-icon--success' : '') + '">' + icon(iconName) + '</div>' +
      '<small>' + escapeHtml(String(label)) + '</small><strong class="' + (valueClass || '') + '">' + value + '</strong><span>' + escapeHtml(String(note || '')) + '</span></article>';
  }

  function summaryCard(iconName, label, value) {
    return '<article class="summary-card"><i>' + icon(iconName) + '</i><div><span>' + escapeHtml(String(label)) + '</span><strong>' + escapeHtml(String(value)) + '</strong></div></article>';
  }

  function quickAction(iconName, title, subtitle, handler) {
    return '<button class="quick-action" onclick="' + handler + '"><i>' + icon(iconName) + '</i><div><strong>' + escapeHtml(title) + '</strong><small>' + escapeHtml(subtitle) + '</small></div></button>';
  }

  function renderLowStockAlerts(products) {
    if (!products || !products.length) return emptyState('check_circle', 'No hay alertas de inventario.');
    return products.map(function (p) {
      return '<div class="alert-item ' + (p.stock === 0 ? 'danger' : '') + '"><span class="product-symbol">' + icon(CATEGORY_ICONS[p.category] || 'inventory_2') + '</span>' +
        '<div><strong>' + escapeHtml(p.name) + '</strong><small>' + (p.stock === 0 ? 'Producto agotado' : 'Quedan ' + p.stock + ' · mínimo ' + p.minimum) + '</small></div>' +
        '<button class="icon-button" onclick="openInventoryModal(\'ENTRADA\', \'' + p.id + '\')">' + icon('add_box') + '</button></div>';
    }).join('');

  function emptyState(iconName, message) {
    return '<div class="empty-state">' + icon(iconName) + '<span>' + escapeHtml(message) + '</span></div>';
  }

  function statusBadge(status) {
    const normalized = String(status || '').toUpperCase();
    const map = {
      ACTIVO: 'badge--success', PAGADA: 'badge--success',
      INACTIVO: 'badge--muted', ANULADA: 'badge--danger'
    };
    return '<span class="badge ' + (map[normalized] || 'badge--info') + '">' + escapeHtml(normalized) + '</span>';
  }

  function roleBadge(role) {
    return '<span class="badge ' + (role === 'ADMIN' ? 'badge--info' : 'badge--success') + '">' + roleLabel(role) + '</span>';
  }

  function roleLabel(role) {
    return role === 'ADMIN' ? 'Administrador' : 'Cajero';
  }

  function paymentIcon(method) {
    const value = String(method).toLowerCase();
    if (value.includes('tarjeta')) return 'credit_card';
    if (value.includes('transfer')) return 'account_balance';
    if (value.includes('mixto')) return 'payments';
    return 'payments';
  }

  function totalLine(label, value) {
    return '<div class="receipt-total total-line"><span>' + escapeHtml(label) + '</span><strong>' + value + '</strong></div>';
  }

  function fieldInput(name, label, value, placeholder, required, type, step, extraClass) {
    return '<label class="field ' + (extraClass || '') + '"><span>' + escapeHtml(label) + '</span><input name="' + name + '" type="' + (type || 'text') + '"' +
      (step ? ' step="' + step + '"' : '') + (required ? ' required' : '') + ' value="' + escapeAttr(value == null ? '' : value) + '" placeholder="' + escapeAttr(placeholder || '') + '"></label>';
  }

  function fieldSelect(name, label, options, selected) {
    return '<label class="field"><span>' + escapeHtml(label) + '</span><select name="' + name + '">' +
      options.map(function (option) { return '<option value="' + escapeAttr(option) + '" ' + (String(option) === String(selected) ? 'selected' : '') + '>' + escapeHtml(option) + '</option>'; }).join('') +
      '</select></label>';
  }

  function fieldSelectObjects(name, label, options, selected, extraClass) {
    return '<label class="field ' + (extraClass || '') + '"><span>' + escapeHtml(label) + '</span><select name="' + name + '" required><option value="">Seleccione...</option>' +
      options.map(function (option) { return '<option value="' + escapeAttr(option.value) + '" ' + (String(option.value) === String(selected) ? 'selected' : '') + '>' + escapeHtml(option.label) + '</option>'; }).join('') +
      '</select></label>';
  }

  function hiddenInput(name, value) {
    return '<input type="hidden" name="' + name + '" value="' + escapeAttr(value || '') + '">';
  }

  function formObject(form) {
    const result = {};
    new FormData(form).forEach(function (value, key) { result[key] = value; });
    return result;
  }

  function money(value) {
    const currency = App.config ? App.config.currency : 'RD$';
    return currency + ' ' + Number(value || 0).toLocaleString('es-DO', {minimumFractionDigits: 2, maximumFractionDigits: 2});
  }

  function compactMoney(value) {
    const n = Number(value || 0);
    if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
    if (n >= 1000) return (n / 1000).toFixed(n >= 10000 ? 0 : 1) + 'K';
    return Math.round(n).toString();
  }

  function roundMoney(value) {
    return Math.round((Number(value || 0) + Number.EPSILON) * 100) / 100;
  }

  function dateTime(value) {
    if (!value) return '';
    return new Intl.DateTimeFormat('es-DO', {dateStyle: 'short', timeStyle: 'short'}).format(new Date(value));
  }

  function shortDate(value) {
    if (!value) return '';
    return new Intl.DateTimeFormat('es-DO', {day: '2-digit', month: 'short'}).format(new Date(value));
  }

  function truncate(value, length) {
    const text = String(value || '');
    return text.length > length ? text.slice(0, length - 1) + '…' : text;
  }

  function icon(name) {
    return '<span class="material-symbols-rounded" aria-hidden="true">' + name + '</span>';
  }

  function escapeHtml(value) {
    return String(value == null ? '' : value)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#039;');
  }

  function escapeAttr(value) {
    return escapeHtml(value).replace(/`/g, '&#096;');
  }

  function escapeJs(value) {
    return String(value == null ? '' : value).replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/\r?\n/g, ' ');

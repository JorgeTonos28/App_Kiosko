<style>
  :root {
    --primary: #0b2f78;
    --primary-2: #163f91;
    --primary-soft: #e9efff;
    --success: #087a55;
    --success-2: #10b981;
    --success-soft: #dcfce7;
    --warning: #d97706;
    --warning-soft: #fff3d6;
    --danger: #c62828;
    --danger-soft: #fee2e2;
    --ink: #172033;
    --muted: #687083;
    --line: #dfe4ef;
    --surface: #ffffff;
    --canvas: #f5f7fd;
    --sidebar: #082d72;
    --radius-sm: 10px;
    --radius: 16px;
    --radius-lg: 24px;
    --shadow: 0 12px 35px rgba(25, 47, 94, .09);
    --shadow-lg: 0 28px 80px rgba(7, 25, 63, .22);
    --sidebar-width: 268px;
  }

  * { box-sizing: border-box; }
  html { font-family: Inter, system-ui, sans-serif; color: var(--ink); background: var(--canvas); }
  body { margin: 0; min-width: 320px; min-height: 100vh; background: var(--canvas); }
  html.scroll-locked, body.scroll-locked { overflow: hidden; overscroll-behavior: none; }
  button, input, select, textarea { font: inherit; }
  button { cursor: pointer; }
  img { max-width: 100%; }
  [hidden] { display: none !important; }
  .material-symbols-rounded { font-size: 22px; line-height: 1; vertical-align: middle; }

  .login-view { min-height: 100vh; display: grid; grid-template-columns: minmax(0, 1.2fr) minmax(420px, .8fr); }
  .login-hero { position: relative; overflow: hidden; display: grid; place-items: center; padding: 64px; background: linear-gradient(145deg, #f8faff 0%, #eef3ff 60%, #e8fff7 100%); }
  .hero-content { position: relative; z-index: 2; width: min(640px, 100%); }
  .hero-content h1 { margin: 18px 0 18px; max-width: 600px; color: var(--primary); font-size: clamp(42px, 5vw, 68px); line-height: 1.02; letter-spacing: -.045em; }
  .hero-content > p { margin: 0; max-width: 580px; color: #4d5668; font-size: 19px; line-height: 1.7; }
  .hero-orb { position: absolute; border-radius: 999px; filter: blur(2px); opacity: .5; }
  .hero-orb--one { width: 340px; height: 340px; right: -120px; top: -80px; background: radial-gradient(circle, #c8d6ff, transparent 70%); }
  .hero-orb--two { width: 440px; height: 440px; left: -180px; bottom: -180px; background: radial-gradient(circle, #aef4d7, transparent 70%); }
  .brand-mark { flex: 0 0 auto; width: 44px; height: 44px; display: grid; place-items: center; color: var(--primary); background: white; border-radius: 13px; box-shadow: 0 8px 25px rgba(0,0,0,.12); }
  .brand-mark--large { width: 70px; height: 70px; border-radius: 20px; margin-bottom: 28px; }
  .brand-mark--large .material-symbols-rounded { font-size: 38px; }
  .eyebrow { color: var(--success); font-size: 12px; font-weight: 800; letter-spacing: .15em; }
  .hero-pills { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 30px; }
  .hero-pills span { display: flex; align-items: center; gap: 7px; padding: 10px 14px; background: rgba(255,255,255,.8); border: 1px solid rgba(145,157,183,.38); border-radius: 999px; font-size: 13px; font-weight: 600; backdrop-filter: blur(8px); }
  .hero-pills i { color: var(--success); font-size: 18px; }
  .hero-preview { width: min(430px, 100%); margin-top: 36px; padding: 24px; display: flex; align-items: end; gap: 32px; background: rgba(255,255,255,.74); border: 1px solid rgba(255,255,255,.85); border-radius: 22px; box-shadow: var(--shadow); backdrop-filter: blur(14px); transform: rotate(-1deg); }
  .mini-stat { display: grid; gap: 4px; white-space: nowrap; }
  .mini-stat span { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .08em; }
  .mini-stat strong { color: var(--primary); font-size: 28px; }
  .mini-stat small { color: var(--success); font-weight: 700; }
  .mini-chart { flex: 1; height: 90px; display: flex; align-items: end; gap: 8px; }
  .mini-chart i { flex: 1; min-width: 15px; border-radius: 7px 7px 2px 2px; background: linear-gradient(#55e7b2, #0b2f78); }

  .login-panel { display: grid; place-items: center; padding: 44px; background: var(--surface); }
  .login-card { width: min(460px, 100%); }
  .login-logo { width: 58px; height: 58px; margin: 0 auto 24px; display: grid; place-items: center; background: var(--primary-soft); color: var(--primary); border-radius: 17px; }
  .login-logo img { width: 100%; height: 100%; object-fit: contain; padding: 7px; }
  .login-logo .material-symbols-rounded { font-size: 31px; }
  .login-heading { margin-bottom: 30px; text-align: center; }
  .login-heading h2 { margin: 8px 0; font-size: 32px; letter-spacing: -.035em; }
  .login-heading p, .login-help { color: var(--muted); }
  .field { display: grid; gap: 8px; margin-bottom: 18px; }
  .field > span, .field-label { color: #394155; font-size: 12px; font-weight: 750; letter-spacing: .06em; text-transform: uppercase; }
  .input-with-icon { position: relative; display: flex; align-items: center; }
  .input-with-icon > i { position: absolute; left: 15px; color: #788094; }
  .input-with-icon input { padding-left: 46px; }
  .input-action { position: absolute; right: 7px; }
  input, select, textarea { width: 100%; min-height: 46px; padding: 11px 13px; color: var(--ink); background: #fbfcff; border: 1px solid #cad1df; border-radius: 11px; outline: none; transition: border-color .18s, box-shadow .18s, background .18s; }
  textarea { min-height: 100px; resize: vertical; }
  input:focus, select:focus, textarea:focus { border-color: #6689d6; background: white; box-shadow: 0 0 0 4px rgba(46, 91, 184, .12); }
  input[type="checkbox"] { width: 18px; min-height: auto; height: 18px; accent-color: var(--primary); }
  .check-line { display: flex; align-items: center; gap: 10px; margin: 4px 0 22px; color: var(--muted); font-size: 14px; }
  .inline-error { margin-top: 14px; padding: 12px 14px; color: #9f1d1d; background: var(--danger-soft); border-radius: 10px; font-size: 13px; }
  .login-help { margin: 24px 0 10px; text-align: center; font-size: 13px; }
  .version-label { display: block; text-align: center; color: #969cad; }

  .button { min-height: 42px; display: inline-flex; align-items: center; justify-content: center; gap: 9px; padding: 10px 16px; border: 0; border-radius: 11px; font-weight: 700; transition: transform .16s, box-shadow .16s, background .16s, opacity .16s; }
  .button:hover { transform: translateY(-1px); }
  .button:active { transform: translateY(0); box-shadow: none; }
  .button:disabled { cursor: not-allowed; opacity: .5; transform: none; }
  .button--large { min-height: 52px; padding-inline: 20px; }
  .button--full { width: 100%; }
  .button--primary { color: white; background: linear-gradient(135deg, var(--primary), var(--primary-2)); box-shadow: 0 9px 20px rgba(11,47,120,.22); }
  .button--success { color: white; background: linear-gradient(135deg, #087a55, #0a9565); box-shadow: 0 9px 20px rgba(8,122,85,.2); }
  .button--danger { color: white; background: var(--danger); }
  .button--ghost { color: var(--primary); background: var(--primary-soft); }
  .button--outline { color: var(--primary); background: white; border: 1px solid #bfc8da; }
  .button--plain { min-height: 34px; padding: 6px 9px; color: var(--primary); background: transparent; }
  .icon-button { width: 40px; height: 40px; display: inline-grid; place-items: center; padding: 0; color: var(--muted); background: transparent; border: 0; border-radius: 10px; }
  .icon-button:hover { color: var(--primary); background: var(--primary-soft); }

  .app-shell { min-height: 100vh; display: grid; grid-template-columns: var(--sidebar-width) minmax(0, 1fr); }
  .sidebar { position: fixed; z-index: 40; inset: 0 auto 0 0; width: var(--sidebar-width); display: flex; flex-direction: column; color: white; background: linear-gradient(180deg, #082e75 0%, #06265f 100%); box-shadow: 10px 0 30px rgba(8,30,76,.08); }
  .sidebar-brand { min-height: 88px; display: flex; align-items: center; gap: 13px; padding: 20px 22px; border-bottom: 1px solid rgba(255,255,255,.1); }
  .sidebar-brand strong { display: block; font-size: 20px; letter-spacing: -.03em; }
  .sidebar-brand small { display: block; margin-top: 3px; color: #9cb7ed; font-size: 10px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; }
  .sidebar-close { display: none; margin-left: auto; color: white; }
  .main-nav { flex: 1; padding: 20px 14px; overflow-y: auto; }
  .nav-item { position: relative; width: 100%; min-height: 48px; display: flex; align-items: center; gap: 13px; margin: 4px 0; padding: 11px 14px; color: #c8d8f8; background: transparent; border: 0; border-radius: 11px; font-size: 14px; font-weight: 650; text-align: left; transition: .18s ease; }
  .nav-item:hover { color: white; background: rgba(255,255,255,.08); transform: translateX(2px); }
  .nav-item.active { color: white; background: rgba(94,137,224,.3); }
  .nav-item.active::before { content: ""; position: absolute; left: -14px; width: 4px; height: 27px; background: #59f0bd; border-radius: 0 6px 6px 0; }
  .nav-item .material-symbols-rounded { color: #b8cbf5; }
  .nav-item.active .material-symbols-rounded { color: #74f5c9; }
  .sidebar-footer { padding: 14px; border-top: 1px solid rgba(255,255,255,.1); }
  .sidebar-user { display: flex; align-items: center; gap: 10px; padding: 8px 8px 14px; }
  .sidebar-user strong, .sidebar-user small { display: block; max-width: 145px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .sidebar-user small { margin-top: 2px; color: #9cb7ed; font-size: 11px; text-transform: capitalize; }
  .nav-item--logout { margin-bottom: 0; }
  .avatar { width: 38px; height: 38px; display: inline-grid; place-items: center; color: var(--primary); background: #d9e5ff; border: 2px solid rgba(255,255,255,.45); border-radius: 50%; font-weight: 800; }
  .avatar--small { width: 36px; height: 36px; }

  .workspace { min-width: 0; grid-column: 2; }
  .app-footer { min-height: 96px; display: flex; align-items: center; justify-content: space-between; gap: 18px; margin: 20px 30px 0; padding: 24px 0 28px; color: #98a2b3; border-top: 1px solid var(--line); font-size: 10px; font-weight: 800; letter-spacing: .16em; text-transform: uppercase; }
  .web-signature { width: var(--signature-width, 140px); max-width: min(30vw, 220px); flex: 0 0 auto; opacity: .82; filter: drop-shadow(0 10px 22px rgba(7,25,63,.12)); }
  .web-signature img { display: block; width: 100%; height: auto; object-fit: contain; }
  .topbar { position: sticky; z-index: 25; top: 0; height: 72px; display: flex; align-items: center; gap: 20px; padding: 0 30px; background: rgba(250,251,255,.88); border-bottom: 1px solid rgba(202,209,223,.8); backdrop-filter: blur(16px); }
  .topbar-search { width: min(560px, 55vw); display: flex; align-items: center; gap: 9px; padding: 0 14px; background: #edf1fb; border: 1px solid transparent; border-radius: 999px; }
  .topbar-search:focus-within { background: white; border-color: #abc0eb; box-shadow: 0 0 0 4px rgba(46,91,184,.08); }
  .topbar-search input { min-height: 42px; padding: 0; background: transparent; border: 0; box-shadow: none; }
  .topbar-search kbd { padding: 4px 7px; color: #8b93a4; background: white; border: 1px solid #d7ddea; border-radius: 6px; font-size: 10px; white-space: nowrap; }
  .topbar-actions { margin-left: auto; display: flex; align-items: center; gap: 16px; }
  .notification-button { position: relative; }
  .notification-button i { position: absolute; top: 6px; right: 7px; width: 7px; height: 7px; background: #e03131; border: 2px solid white; border-radius: 50%; }
  .topbar-profile { display: flex; align-items: center; gap: 9px; padding-left: 16px; border-left: 1px solid var(--line); }
  .topbar-profile strong, .topbar-profile small { display: block; }
  .topbar-profile strong { font-size: 13px; }
  .topbar-profile small { margin-top: 2px; color: var(--muted); font-size: 10px; text-transform: capitalize; }
  .mobile-menu { display: none; }

  .page-content { width: min(1560px, 100%); margin: 0 auto; padding: 30px; }
  .page-enter { animation: pageEnter .28s ease both; }
  @keyframes pageEnter { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  .page-header { display: flex; align-items: flex-end; justify-content: space-between; gap: 20px; margin-bottom: 24px; }
  .page-title h1 { margin: 0 0 7px; color: var(--primary); font-size: clamp(26px, 3vw, 38px); letter-spacing: -.04em; }
  .page-title p { margin: 0; color: var(--muted); }
  .header-actions { display: flex; flex-wrap: wrap; gap: 10px; }
  .section-title { margin: 0; font-size: 18px; letter-spacing: -.02em; }

  .metrics-grid { display: grid; grid-template-columns: repeat(6, minmax(150px, 1fr)); gap: 15px; margin-bottom: 22px; }
  .metric-card { position: relative; min-height: 150px; padding: 20px; overflow: hidden; background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: 0 7px 25px rgba(24,45,87,.05); transition: transform .2s, box-shadow .2s; }
  .metric-card:hover { transform: translateY(-3px); box-shadow: var(--shadow); }
  .metric-card::after { content: ""; position: absolute; right: -25px; bottom: -35px; width: 95px; height: 95px; background: var(--primary-soft); border-radius: 50%; opacity: .65; }
  .metric-icon { width: 40px; height: 40px; display: grid; place-items: center; margin-bottom: 14px; color: var(--primary); background: var(--primary-soft); border-radius: 12px; }
  .metric-icon--success { color: var(--success); background: var(--success-soft); }
  .metric-icon--warning { color: var(--warning); background: var(--warning-soft); }
  .metric-icon--danger { color: var(--danger); background: var(--danger-soft); }
  .metric-card small { display: block; color: var(--muted); font-weight: 650; text-transform: uppercase; letter-spacing: .06em; }
  .metric-card strong { position: relative; z-index: 1; display: block; margin: 8px 0 6px; color: var(--primary); font-size: 25px; letter-spacing: -.035em; }
  .metric-card span { color: var(--muted); font-size: 12px; }
  .metric-card .positive { color: var(--success); }
  .metric-card .negative { color: var(--danger); }

  .dashboard-grid { display: grid; grid-template-columns: minmax(0, 2fr) minmax(270px, .75fr); gap: 20px; margin-bottom: 22px; }
  .card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: 0 7px 24px rgba(24,45,87,.045); }
  .card-header { min-height: 64px; display: flex; align-items: center; justify-content: space-between; gap: 14px; padding: 18px 20px; border-bottom: 1px solid var(--line); }
  .card-body { padding: 20px; }
  .sales-chart { height: 290px; display: flex; align-items: end; gap: 16px; padding: 25px 12px 6px; }
  .chart-column { flex: 1; height: 100%; display: flex; flex-direction: column; justify-content: end; align-items: center; gap: 9px; }
  .chart-column small { color: var(--muted); font-size: 11px; }
  .chart-column strong { color: var(--primary); font-size: 11px; }
  .chart-bar { width: min(54px, 75%); min-height: 4px; background: linear-gradient(180deg, #57e8b5, #194597); border-radius: 9px 9px 3px 3px; transform-origin: bottom; animation: growBar .55s ease both; }
  @keyframes growBar { from { transform: scaleY(.05); opacity: .2; } to { transform: scaleY(1); opacity: 1; } }
  .alerts-list { display: grid; gap: 10px; }
  .alert-item { display: flex; align-items: center; gap: 11px; padding: 13px; background: #fff; border: 1px solid var(--line); border-left: 4px solid var(--warning); border-radius: 11px; }
  .alert-item.danger { border-left-color: var(--danger); }
  .alert-item .product-symbol { width: 39px; height: 39px; }
  .alert-item strong, .alert-item small { display: block; }
  .alert-item strong { font-size: 13px; }
  .alert-item small { margin-top: 3px; color: var(--muted); font-size: 11px; }
  .quick-actions { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 22px; }
  .quick-action { min-height: 82px; display: flex; align-items: center; gap: 13px; padding: 16px; color: var(--ink); background: white; border: 1px solid var(--line); border-radius: var(--radius); text-align: left; transition: .18s; }
  .quick-action:hover { border-color: #9fb4e1; transform: translateY(-2px); box-shadow: var(--shadow); }
  .quick-action i { width: 44px; height: 44px; display: grid; place-items: center; flex: 0 0 auto; color: var(--primary); background: var(--primary-soft); border-radius: 13px; }
  .quick-action strong, .quick-action small { display: block; }
  .quick-action small { margin-top: 4px; color: var(--muted); font-size: 11px; }

  .table-card { overflow: hidden; }
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  th { padding: 13px 16px; color: #656d7f; background: #f0f3fd; font-size: 11px; font-weight: 800; letter-spacing: .06em; text-align: left; text-transform: uppercase; white-space: nowrap; }
  td { padding: 15px 16px; border-top: 1px solid var(--line); font-size: 13px; vertical-align: middle; }
  tbody tr { transition: background .15s; }
  tbody tr:hover { background: #fafbff; }
  .table-primary { color: var(--primary); font-weight: 750; }
  .table-product { display: flex; align-items: center; gap: 10px; min-width: 200px; }
  .table-product strong, .table-product small { display: block; }
  .table-product small { margin-top: 3px; color: var(--muted); }
  .table-actions { display: flex; align-items: center; gap: 5px; }
  .badge { display: inline-flex; align-items: center; gap: 5px; min-height: 25px; padding: 4px 9px; border-radius: 999px; font-size: 10px; font-weight: 800; letter-spacing: .05em; text-transform: uppercase; white-space: nowrap; }
  .badge--success { color: #046241; background: #c7f9e5; }
  .badge--warning { color: #9a5700; background: #fff0c2; }
  .badge--danger { color: #a51d1d; background: #ffd8d8; }
  .badge--info { color: #163f91; background: #dfe8ff; }
  .badge--muted { color: #596172; background: #e9ecf3; }
  .empty-state { padding: 54px 24px; color: var(--muted); text-align: center; }
  .empty-state .material-symbols-rounded { display: block; margin-bottom: 10px; color: #aab4c7; font-size: 46px; }

  .pos-layout { display: grid; grid-template-columns: minmax(0, 1fr) 390px; gap: 20px; align-items: start; }
  .pos-catalog { min-width: 0; }
  .pos-search { position: relative; margin-bottom: 14px; }
  .pos-search .material-symbols-rounded { position: absolute; top: 50%; left: 16px; transform: translateY(-50%); color: var(--muted); }
  .pos-search input { min-height: 54px; padding-left: 50px; padding-right: 125px; font-size: 16px; background: white; border-radius: 15px; }
  .pos-search kbd { position: absolute; top: 50%; right: 14px; transform: translateY(-50%); padding: 5px 8px; color: var(--muted); background: #f0f3fa; border: 1px solid var(--line); border-radius: 7px; font-size: 10px; }
  .category-tabs { display: flex; gap: 9px; margin: 0 0 16px; overflow-x: auto; scrollbar-width: none; }
  .category-tab { min-height: 40px; padding: 8px 17px; color: #4e5667; background: #e8edf8; border: 0; border-radius: 999px; white-space: nowrap; }
  .category-tab.active { color: white; background: var(--primary); }
  .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(175px, 1fr)); gap: 14px; }
  .product-card { position: relative; overflow: hidden; background: white; border: 1px solid var(--line); border-radius: 16px; transition: transform .18s, box-shadow .18s, border-color .18s; }
  .product-card:hover { transform: translateY(-3px); border-color: #afbee0; box-shadow: var(--shadow); }
  .product-card.out { opacity: .58; }
  .product-image { position: relative; height: 120px; display: grid; place-items: center; overflow: hidden; background: linear-gradient(145deg, #ecf1ff, #f6f8ff); }
  .product-image img { width: 100%; height: 100%; object-fit: cover; }
  .product-symbol { width: 62px; height: 62px; display: grid; place-items: center; color: white; background: linear-gradient(145deg, #18499c, #10a879); border-radius: 17px; font-size: 25px; font-weight: 800; box-shadow: 0 10px 20px rgba(19,64,131,.18); }
  .stock-chip { position: absolute; top: 9px; right: 9px; z-index: 2; padding: 5px 8px; color: #087452; background: #bdf6df; border-radius: 7px; font-size: 10px; font-weight: 750; }
  .stock-chip.low { color: #a21c1c; background: #ffd4d4; }
  .product-info { padding: 14px; }
  .product-info > small { color: var(--muted); font-size: 10px; text-transform: uppercase; }
  .product-info h3 { height: 40px; margin: 5px 0 12px; overflow: hidden; font-size: 14px; line-height: 1.4; }
  .product-footer { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .product-price { color: var(--primary); font-size: 19px; font-weight: 800; }
  .add-product { width: 38px; height: 38px; display: grid; place-items: center; color: white; background: var(--primary); border: 0; border-radius: 12px; }
  .add-product:disabled { opacity: .35; }
  .product-card.bump { animation: cardBump .34s ease; }
  @keyframes cardBump { 50% { transform: scale(.96); box-shadow: 0 0 0 5px rgba(16,185,129,.18); } }

  .cart-panel { position: sticky; top: 92px; overflow: hidden; background: white; border: 1px solid #cdd5e4; border-radius: 19px; box-shadow: var(--shadow); }
  .cart-header { display: flex; align-items: center; justify-content: space-between; padding: 18px; background: #f1f5ff; border-bottom: 1px solid var(--line); }
  .cart-header h2 { display: flex; align-items: center; gap: 9px; margin: 0; color: var(--primary); font-size: 19px; }
  .cart-header small { display: block; margin: 5px 0 0 31px; color: var(--muted); font-size: 10px; }
  .cart-items { min-height: 200px; max-height: 37vh; padding: 12px; overflow-y: auto; background: #f5f8ff; }
  .cart-empty { min-height: 190px; display: grid; place-items: center; align-content: center; gap: 8px; color: var(--muted); text-align: center; }
  .cart-empty .material-symbols-rounded { color: #a8b4ca; font-size: 44px; }
  .cart-item { display: grid; grid-template-columns: 1fr auto; gap: 10px; margin-bottom: 9px; padding: 12px; background: white; border: 1px solid var(--line); border-radius: 13px; animation: cartIn .25s ease both; }
  @keyframes cartIn { from { opacity: 0; transform: translateX(12px); } to { opacity: 1; transform: none; } }
  .cart-item h4 { margin: 0 0 4px; font-size: 13px; }
  .cart-item small { color: var(--muted); }
  .cart-item strong { color: var(--primary); }
  .cart-item-controls { grid-column: 1 / -1; display: flex; align-items: center; justify-content: space-between; padding-top: 8px; border-top: 1px solid #edf0f6; }
  .quantity-control { display: inline-flex; align-items: center; gap: 8px; }
